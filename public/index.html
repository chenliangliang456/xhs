<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 文生图工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <style>
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      .bg-dots {
        background-color: #fafbfc;
        background-image: radial-gradient(circle at 1px 1px, rgb(226 232 240 / 0.9) 1px, transparent 0);
        background-size: 24px 24px;
      }
      .ph-fallback {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 45%, #f8fafc 100%);
      }
    </style>
  </head>
  <body class="bg-dots min-h-screen text-slate-800 antialiased">
    <div class="relative mx-auto flex min-h-screen max-w-6xl flex-col px-5 pb-16 pt-8 sm:px-8 sm:pb-20 sm:pt-12">
      <header
        class="flex items-center justify-between gap-4 rounded-2xl border border-slate-200/80 bg-white/90 px-4 py-3 shadow-sm shadow-slate-200/50 backdrop-blur sm:px-6"
      >
        <div class="flex items-center gap-3">
          <span
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-slate-900 text-sm font-bold tracking-tight text-white shadow-md"
            >AI</span
          >
          <div>
            <p class="text-sm font-semibold text-slate-900">文生图工作台</p>
            <p class="text-xs text-slate-500">批量出图 · 压缩包下载</p>
          </div>
        </div>
        <a
          href="batch.html"
          class="shrink-0 rounded-xl bg-slate-900 px-4 py-2.5 text-xs font-semibold text-white shadow-sm transition hover:bg-slate-800 sm:px-5 sm:text-sm"
        >
          进入批量生图 →
        </a>
      </header>

      <main class="mt-10 grid flex-1 gap-10 lg:mt-14 lg:grid-cols-2 lg:items-center lg:gap-12">
        <div class="text-center lg:text-left">
          <p
            class="mb-4 inline-flex items-center gap-2 rounded-full border border-sky-100 bg-sky-50 px-3 py-1 text-xs font-medium text-sky-800 sm:text-sm"
          >
            <span class="h-2 w-2 rounded-full bg-sky-500"></span>
            服务已就绪
          </p>
          <h1 class="text-4xl font-bold leading-[1.12] tracking-tight text-slate-900 sm:text-5xl">
            批量文生图，
            <span class="text-sky-600">一次出齐</span>
          </h1>
          <p class="mx-auto mt-5 max-w-lg text-base leading-relaxed text-slate-600 lg:mx-0 sm:text-lg">
            写好描述、选好数量与画幅，一键并行生成；例如 50 张会合并为 1 个 ZIP，包内按序号含全部 50 张图片。
          </p>
          <div class="mt-8 flex flex-col items-stretch gap-3 sm:flex-row sm:justify-center lg:justify-start">
            <a
              href="batch.html"
              class="inline-flex items-center justify-center gap-2 rounded-2xl bg-sky-600 px-8 py-4 text-base font-semibold text-white shadow-lg shadow-sky-600/25 transition hover:bg-sky-500"
            >
              开始批量生图
              <span aria-hidden="true">→</span>
            </a>
            <a
              href="batch.html"
              class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-8 py-4 text-base font-semibold text-slate-700 shadow-sm transition hover:border-slate-300 hover:bg-slate-50"
            >
              查看工作流
            </a>
          </div>
        </div>

        <div class="relative mx-auto w-full max-w-lg lg:mx-0 lg:max-w-none">
          <div
            class="relative overflow-hidden rounded-3xl border border-slate-200/90 bg-white shadow-2xl shadow-slate-300/40 ring-1 ring-slate-100"
          >
            <div class="ph-fallback aspect-[4/3] w-full">
              <img
                src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&h=900&q=85"
                width="1200"
                height="900"
                alt=""
                class="h-full w-full object-cover"
                loading="eager"
                decoding="async"
                fetchpriority="high"
              />
            </div>
            <div
              class="pointer-events-none absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-black/15 to-transparent"
              aria-hidden="true"
            ></div>
          </div>
          <div
            class="absolute -right-2 top-8 hidden w-28 overflow-hidden rounded-2xl border border-white bg-white shadow-xl shadow-slate-200/80 ring-1 ring-slate-100 sm:block lg:-right-4 lg:top-12 lg:w-36"
          >
            <div class="ph-fallback aspect-square w-full">
              <img
                src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=400&h=400&q=85"
                width="400"
                height="400"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
          <div
            class="absolute -left-2 bottom-16 hidden w-24 overflow-hidden rounded-2xl border border-white bg-white shadow-lg shadow-slate-200/80 ring-1 ring-slate-100 sm:block lg:-left-4 lg:bottom-20 lg:w-32"
          >
            <div class="ph-fallback aspect-[3/4] w-full">
              <img
                src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=500&h=667&q=85"
                width="500"
                height="667"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
        </div>
      </main>

      <section class="mt-14 lg:mt-16" aria-label="画幅参考">
        <div class="mb-6 flex items-center justify-center gap-3">
          <span class="h-px w-12 max-w-[20%] bg-gradient-to-r from-transparent to-slate-300"></span>
          <span class="text-xs font-medium tracking-widest text-slate-400">参考</span>
          <span class="h-px w-12 max-w-[20%] bg-gradient-to-l from-transparent to-slate-300"></span>
        </div>
        <div
          class="flex gap-4 overflow-x-auto pb-2 [-ms-overflow-style:none] [scrollbar-width:none] sm:justify-center [&::-webkit-scrollbar]:hidden"
        >
          <div
            class="shrink-0 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md w-[140px] sm:w-[160px]"
          >
            <div class="ph-fallback aspect-square">
              <img
                src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&h=400&q=80"
                width="400"
                height="400"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
          <div
            class="shrink-0 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md w-[180px] sm:w-[200px]"
          >
            <div class="ph-fallback aspect-video">
              <img
                src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&h=450&q=80"
                width="800"
                height="450"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
          <div
            class="shrink-0 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md w-[120px] sm:w-[140px]"
          >
            <div class="ph-fallback aspect-[9/16]">
              <img
                src="https://images.unsplash.com/photo-1511593358241-7eea1f3c84e5?auto=format&fit=crop&w=540&h=960&q=80"
                width="540"
                height="960"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
          <div
            class="shrink-0 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-md w-[140px] sm:w-[160px]"
          >
            <div class="ph-fallback aspect-[4/3]">
              <img
                src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=640&h=480&q=80"
                width="640"
                height="480"
                alt=""
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
          </div>
        </div>
      </section>

      <section class="mt-12 grid gap-5 sm:grid-cols-3 lg:mt-14">
        <article
          class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:shadow-md"
        >
          <div class="ph-fallback aspect-[5/3] w-full border-b border-slate-100">
            <img
              src="https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=720&h=432&q=80"
              width="720"
              height="432"
              alt=""
              class="h-full w-full object-cover"
              loading="lazy"
            />
          </div>
          <div class="p-5">
            <h2 class="font-semibold text-slate-900">并行出图</h2>
            <p class="mt-2 text-sm leading-relaxed text-slate-600">
              队列控制并发，大批量更稳，不拖垮本机与上游。
            </p>
          </div>
        </article>
        <article
          class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:shadow-md"
        >
          <div class="ph-fallback aspect-[5/3] w-full border-b border-slate-100">
            <img
              src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=720&h=432&q=80"
              width="720"
              height="432"
              alt=""
              class="h-full w-full object-cover"
              loading="lazy"
            />
          </div>
          <div class="p-5">
            <h2 class="font-semibold text-slate-900">多比例画幅</h2>
            <p class="mt-2 text-sm leading-relaxed text-slate-600">
              常见比例一次选好，整批统一，方便后期排版。
            </p>
          </div>
        </article>
        <article
          class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:shadow-md"
        >
          <div class="ph-fallback aspect-[5/3] w-full border-b border-slate-100">
            <img
              src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=720&h=432&q=80"
              width="720"
              height="432"
              alt=""
              class="h-full w-full object-cover"
              loading="lazy"
            />
          </div>
          <div class="p-5">
            <h2 class="font-semibold text-slate-900">批量压缩包</h2>
            <p class="mt-2 text-sm leading-relaxed text-slate-600">
              生成几张就下载 1 个压缩包，包内按 001、002… 整齐排列全部图片，页面可预览。
            </p>
          </div>
        </article>
      </section>

      <footer class="mt-auto border-t border-slate-200/80 pt-10 text-center text-xs text-slate-500">
        内网访问请带上端口 · 例如 <span class="font-mono text-slate-600">:8888</span>
      </footer>
    </div>
  </body>
</html>
